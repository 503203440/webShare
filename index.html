<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Share - 文件共享</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 24px;
            margin-bottom: 24px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Upload Area */
        .upload-zone {
            border: 2px dashed #d9d9d9;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        .upload-zone:hover {
            border-color: #4096ff;
            background: #f0f5ff;
        }
        .upload-zone.dragover {
            border-color: #4096ff;
            background: #e6f4ff;
        }
        .upload-zone.dragover .upload-icon {
            transform: scale(1.1);
        }
        .upload-icon {
            font-size: 48px;
            color: #4096ff;
            margin-bottom: 16px;
            display: block;
            transition: transform 0.3s ease;
        }
        .upload-zone p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        .upload-zone .hint {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }
        .upload-zone input[type="file"] {
            display: none;
        }

        /* File List */
        .file-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .file-count {
            font-size: 13px;
            color: #999;
        }
        .refresh-btn {
            background: none;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            padding: 6px 16px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .refresh-btn:hover {
            border-color: #4096ff;
            color: #4096ff;
        }
        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .file-table {
            width: 100%;
            border-collapse: collapse;
        }
        .file-table th {
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            padding: 10px 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        .file-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #f5f5f5;
            font-size: 14px;
        }
        .file-table tr:hover td {
            background: #fafafa;
        }
        .file-name {
            color: #1a1a1a;
            word-break: break-all;
        }
        .file-name.folder {
            color: #4096ff;
        }
        .file-size {
            color: #999;
            white-space: nowrap;
        }
        .file-time {
            color: #999;
            white-space: nowrap;
            font-size: 13px;
        }
        .file-actions {
            white-space: nowrap;
            text-align: right;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            background: #f5f5f5;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
            color: #333;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .download-btn:hover {
            background: #e6f4ff;
            border-color: #4096ff;
            color: #4096ff;
        }
        .preview-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            background: none;
            border: none;
            font-size: 13px;
            color: #4096ff;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .preview-btn:hover {
            color: #1677ff;
        }
        .action-divider {
            color: #d9d9d9;
            margin: 0 4px;
            font-size: 12px;
        }

        /* Preview Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: #fff;
            border-radius: 12px;
            max-width: 90vw;
            max-height: 90vh;
            width: 100%;
            overflow: auto;
            position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 1;
        }
        .modal-header h3 {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            word-break: break-all;
            margin-right: 16px;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 22px;
            color: #999;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            flex-shrink: 0;
            line-height: 1;
        }
        .modal-close:hover {
            background: #f5f5f5;
            color: #333;
        }
        .modal-body {
            padding: 20px;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-body img {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 4px;
        }
        .modal-body video {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 4px;
        }
        .modal-body pre {
            width: 100%;
            max-height: 70vh;
            overflow: auto;
            background: #f6f8fa;
            border-radius: 6px;
            padding: 16px;
            font-size: 13px;
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            margin: 0;
        }
        .modal-body .unsupported {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 14px;
        }
        .modal-body .unsupported .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
        }
        .preview-loading {
            color: #999;
            font-size: 14px;
            padding: 40px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #ccc;
        }
        .empty-state p {
            font-size: 14px;
            margin-top: 8px;
            color: #bbb;
        }

        /* Upload Progress */
        .upload-progress {
            margin-top: 16px;
            display: none;
        }
        .upload-progress.active {
            display: block;
        }
        .progress-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            font-size: 13px;
            color: #666;
        }
        .progress-bar-bg {
            flex: 1;
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4096ff, #1677ff);
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0;
        }
        .progress-text {
            white-space: nowrap;
            min-width: 40px;
            text-align: right;
            font-size: 12px;
            color: #999;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            color: #fff;
            z-index: 1000;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast.success {
            background: #52c41a;
        }
        .toast.error {
            background: #ff4d4f;
        }

        /* Chat */
        .chat-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #4096ff;
            color: #fff;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(64, 150, 255, 0.4);
            z-index: 1000;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
        }
        .chat-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(64, 150, 255, 0.5);
        }
        .chat-panel {
            position: fixed;
            bottom: 90px;
            right: 24px;
            width: 360px;
            height: 520px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            z-index: 999;
            display: flex;
            flex-direction: column;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            overflow: hidden;
        }
        .chat-panel.active {
            transform: translateX(0);
        }

        .chat-header {
            padding: 14px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafafa;
            flex-shrink: 0;
        }
        .chat-header-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-header-title .online-count {
            font-size: 12px;
            font-weight: 400;
            color: #999;
        }
        .chat-close {
            background: none;
            border: none;
            font-size: 20px;
            color: #999;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
            border-radius: 4px;
        }
        .chat-close:hover {
            background: #f0f0f0;
            color: #333;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chat-messages:empty::after {
            content: '暂无消息';
            display: block;
            text-align: center;
            color: #ccc;
            font-size: 13px;
            padding: 40px 0;
        }

        .chat-msg {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .chat-msg-user {
            font-size: 12px;
            color: #4096ff;
            font-weight: 500;
        }
        .chat-msg-text {
            font-size: 14px;
            color: #333;
            line-height: 1.5;
            word-break: break-word;
        }
        .chat-msg-time {
            font-size: 11px;
            color: #ccc;
        }

        .chat-msg-system {
            text-align: center;
            font-size: 12px;
            color: #bbb;
            padding: 4px 0;
        }

        .chat-input-area {
            padding: 12px 16px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            gap: 8px;
            background: #fff;
            flex-shrink: 0;
        }
        .chat-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .chat-input:focus {
            border-color: #4096ff;
        }
        .chat-send {
            padding: 8px 16px;
            background: #4096ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .chat-send:hover {
            background: #1677ff;
        }
        .chat-send:disabled {
            background: #d9d9d9;
            cursor: not-allowed;
        }

        @media (max-width: 640px) {
            .chat-panel {
                right: 12px;
                bottom: 78px;
                width: calc(100% - 24px);
                height: 50vh;
            }
            .chat-toggle {
                bottom: 16px;
                right: 16px;
                width: 48px;
                height: 48px;
                font-size: 13px;
            }
            .container {
                padding: 16px 12px;
            }
            .card {
                padding: 16px;
            }
            .file-table th:nth-child(2),
            .file-table td:nth-child(2),
            .file-table th:nth-child(3),
            .file-table td:nth-child(3) {
                display: none;
            }
            .upload-zone {
                padding: 24px 16px;
            }
            .upload-zone .upload-icon {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Web Share</h1>
            <p>文件共享服务</p>
        </div>

        <div class="card">
            <div class="card-title">上传文件</div>
            <div class="upload-zone" id="uploadZone">
                <span class="upload-icon">&#x2B06;</span>
                <p>拖拽文件到此处上传</p>
                <p class="hint">或点击此区域选择文件</p>
                <input type="file" id="fileInput" multiple>
            </div>
            <div class="upload-progress" id="uploadProgress"></div>
        </div>

        <div class="card">
            <div class="file-list-header">
                <div>
                    <span class="card-title">文件列表</span>
                    <span class="file-count" id="fileCount"></span>
                </div>
                <button class="refresh-btn" id="refreshBtn" onclick="loadFiles(currentPath)">刷新</button>
            </div>
            <table class="file-table">
                <thead>
                    <tr>
                        <th>文件名</th>
                        <th>大小</th>
                        <th>修改时间</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="fileListBody"></tbody>
            </table>
            <div class="empty-state" id="emptyState">
                <p>暂无文件</p>
            </div>
        </div>
    </div>

    <!-- Chat -->
    <button class="chat-toggle" id="chatToggle" onclick="toggleChat()">
        聊天
    </button>

    <div class="chat-panel" id="chatPanel">
        <div class="chat-header">
            <div class="chat-header-title">
                <span>聊天室</span>
                <span class="online-count" id="onlineCount"></span>
            </div>
            <button class="chat-close" onclick="toggleChat()">&times;</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="输入消息..." maxlength="500">
            <button class="chat-send" id="chatSendBtn" onclick="sendChatMessage()">发送</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Preview Modal -->
    <div class="modal-overlay" id="previewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="previewTitle">预览</h3>
                <button class="modal-close" onclick="closePreview()">&times;</button>
            </div>
            <div class="modal-body" id="previewBody">
                <span class="preview-loading">加载中...</span>
            </div>
        </div>
    </div>

    <script>
        var BASE = window.location.pathname.replace(/\/+$/, '') || '';
        (function() {
            var s = document.createElement('script');
            s.src = BASE + '/api/mpegts.js';
            document.head.appendChild(s);
        })();

        var currentPath = '';
        var currentPlayer = null;
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const uploadProgress = document.getElementById('uploadProgress');
        const fileListBody = document.getElementById('fileListBody');
        const emptyState = document.getElementById('emptyState');
        const fileCount = document.getElementById('fileCount');

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            const k = 1024;
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + units[i];
        }

        function formatTime(t) {
            if (!t) return '-';
            return t;
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            setTimeout(function() {
                toast.classList.remove('show');
            }, 3000);
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // Drag and drop
        uploadZone.addEventListener('dragenter', function(e) {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', function(e) {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            var files = e.dataTransfer.files;
            if (files.length > 0) {
                uploadFiles(files, currentPath);
            }
        });

        uploadZone.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                uploadFiles(this.files, currentPath);
                this.value = '';
            }
        });

        function uploadFiles(files, dir) {
            uploadProgress.innerHTML = '';
            uploadProgress.classList.add('active');

            for (var i = 0; i < files.length; i++) {
                (function(file, idx) {
                    var item = document.createElement('div');
                    item.className = 'progress-item';
                    item.innerHTML =
                        '<span class="progress-name">' + escapeHtml(file.name) + '</span>' +
                        '<div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-' + idx + '"></div></div>' +
                        '<span class="progress-text" id="progressText-' + idx + '">0%</span>';
                    uploadProgress.appendChild(item);

                    var formData = new FormData();
                    formData.append('file', file);

                    var xhr = new XMLHttpRequest();
                    var query = dir ? '?path=' + encodeURIComponent(dir) : '';
                    xhr.open('POST', BASE + '/upload' + query, true);

                    xhr.upload.onprogress = function(e) {
                        if (e.lengthComputable) {
                            var pct = Math.round((e.loaded / e.total) * 100);
                            document.getElementById('progress-' + idx).style.width = pct + '%';
                            document.getElementById('progressText-' + idx).textContent = pct + '%';
                        }
                    };

                    xhr.onload = function() {
                        if (xhr.status === 200) {
                            document.getElementById('progress-' + idx).style.width = '100%';
                            document.getElementById('progressText-' + idx).textContent = '完成';
                            showToast('"' + file.name + '" 上传成功', 'success');
                            loadFiles(currentPath);
                        } else {
                            var errMsg = '上传失败';
                            try {
                                var resp = JSON.parse(xhr.responseText);
                                errMsg = resp.error || errMsg;
                            } catch(e) {}
                            document.getElementById('progressText-' + idx).textContent = '失败';
                            showToast('"' + file.name + '" ' + errMsg, 'error');
                        }
                    };

                    xhr.onerror = function() {
                        document.getElementById('progressText-' + idx).textContent = '失败';
                        showToast('"' + file.name + '" 上传失败，网络错误', 'error');
                    };

                    xhr.send(formData);
                })(files[i], i);
            }
        }

        function loadFiles(dir) {
            currentPath = dir || '';
            var btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '加载中...';

            var xhr = new XMLHttpRequest();
            var query = currentPath ? '?path=' + encodeURIComponent(currentPath) : '';
            xhr.open('GET', BASE + '/api/files' + query, true);

            xhr.onload = function() {
                btn.disabled = false;
                btn.textContent = '刷新';

                if (xhr.status === 200) {
                    try {
                        var files = JSON.parse(xhr.responseText);
                        renderFileList(files, currentPath);
                    } catch(e) {
                        showToast('文件列表数据解析失败', 'error');
                    }
                } else {
                    var errMsg = '加载文件列表失败';
                    try {
                        var resp = JSON.parse(xhr.responseText);
                        errMsg = resp.error || errMsg;
                    } catch(e) {}
                    showToast(errMsg, 'error');
                }
            };

            xhr.onerror = function() {
                btn.disabled = false;
                btn.textContent = '刷新';
                showToast('加载文件列表失败，网络错误', 'error');
            };

            xhr.send();
        }

        function navigateTo(dir) {
            loadFiles(dir);
        }

        function renderFileList(files, dir) {
            fileListBody.innerHTML = '';

            if (!files || files.length === 0) {
                if (dir) {
                    var tr = document.createElement('tr');
                    tr.innerHTML = '<td class="file-name folder" style="cursor:pointer" onclick="navigateTo(\'' + escapeHtml(getParentPath(dir)) + '\')">..</td><td>-</td><td>-</td><td></td>';
                    fileListBody.appendChild(tr);
                }
                emptyState.style.display = dir ? 'none' : 'block';
                fileCount.textContent = dir ? '(空目录)' : '(0 个文件)';
                return;
            }

            emptyState.style.display = 'none';
            fileCount.textContent = '(' + files.length + ' 个文件)';

            if (dir) {
                var tr = document.createElement('tr');
                tr.innerHTML = '<td class="file-name folder" style="cursor:pointer" onclick="navigateTo(\'' + escapeHtml(getParentPath(dir)) + '\')">..</td><td class="file-size">-</td><td class="file-time">-</td><td></td>';
                fileListBody.appendChild(tr);
            }

            for (var i = 0; i < files.length; i++) {
                var f = files[i];
                var tr = document.createElement('tr');
                if (f.isDir) {
                    var childPath = dir ? dir + '/' + f.name : f.name;
                    tr.innerHTML =
                        '<td class="file-name folder" style="cursor:pointer" onclick="navigateTo(\'' + escapeHtml(childPath) + '\')">' + escapeHtml(f.name) + '</td>' +
                        '<td class="file-size">-</td>' +
                        '<td class="file-time">' + formatTime(f.modTime) + '</td>' +
                        '<td></td>';
                } else {
                    var filePath = dir ? dir + '/' + f.name : f.name;
                    tr.innerHTML =
                        '<td class="file-name">' + escapeHtml(f.name) + '</td>' +
                        '<td class="file-size">' + formatSize(f.size) + '</td>' +
                        '<td class="file-time">' + formatTime(f.modTime) + '</td>' +
                        '<td class="file-actions"><button class="preview-btn" onclick="previewFile(\'' + escapeHtml(filePath) + '\')">预览</button><span class="action-divider">|</span><a class="download-btn" href="' + BASE + '/' + encodeURIComponent(filePath) + '" download>下载</a></td>';
                }
                fileListBody.appendChild(tr);
            }
        }

        function getParentPath(dir) {
            if (!dir) return '';
            var parts = dir.replace(/\/+$/, '').split('/');
            parts.pop();
            return parts.join('/');
        }

        // Preview
        var previewableImages = ['jpg', 'jpeg', 'png', 'gif', 'svg', 'webp', 'bmp', 'ico'];
        var previewableText = ['txt', 'md', 'json', 'xml', 'yml', 'yaml', 'log', 'csv', 'ini', 'cfg', 'conf',
            'js', 'ts', 'jsx', 'tsx', 'html', 'htm', 'css', 'scss', 'less',
            'go', 'py', 'java', 'c', 'cpp', 'h', 'hpp', 'rs', 'rb', 'php', 'sh', 'bat', 'ps1',
            'toml', 'sql', 'env', 'editorconfig', 'gitignore'];
        var previewableVideo = ['mp4', 'webm', 'ogg'];

        function getFileExtension(filename) {
            var idx = filename.lastIndexOf('.');
            return idx !== -1 ? filename.substring(idx + 1).toLowerCase() : '';
        }

        function closePreview() {
            if (currentPlayer) {
                currentPlayer.destroy();
                currentPlayer = null;
            }
            document.getElementById('previewModal').classList.remove('active');
            document.getElementById('previewBody').innerHTML = '<span class="preview-loading">加载中...</span>';
        }

        // Close modal on overlay click
        document.getElementById('previewModal').addEventListener('click', function(e) {
            if (e.target === this) closePreview();
        });

        // Close modal on Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closePreview();
        });

        function previewFile(filePath) {
            var modal = document.getElementById('previewModal');
            var title = document.getElementById('previewTitle');
            var body = document.getElementById('previewBody');

            title.textContent = filePath.split('/').pop() || filePath;
            body.innerHTML = '<span class="preview-loading">加载中...</span>';
            modal.classList.add('active');

            var ext = getFileExtension(filePath);

            if (previewableImages.indexOf(ext) !== -1) {
                body.innerHTML = '<img src="' + BASE + '/' + encodeURIComponent(filePath) + '" alt="' + escapeHtml(filePath) + '" onerror="this.parentElement.innerHTML=\'<div class=\\\'unsupported\\\'><span class=\\\'icon\\\'>&#9888;</span><p>图片加载失败</p></div>\'" />';
                return;
            }

            if (previewableVideo.indexOf(ext) !== -1) {
                body.innerHTML = '<video controls style="max-width:100%;max-height:70vh;border-radius:4px;" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'"><source src="' + BASE + '/' + encodeURIComponent(filePath) + '" type="video/' + ext + '">您的浏览器不支持视频播放</video><div class="unsupported" style="display:none"><span class="icon">&#9888;</span><p>视频加载失败，可能原因：<br>1. 视频编码格式不被浏览器支持<br>2. 文件损坏或不存在</p></div>';
                return;
            }

            if (ext === 'flv') {
                body.innerHTML = '';
                var video = document.createElement('video');
                video.controls = true;
                video.style.maxWidth = '100%';
                video.style.maxHeight = '70vh';
                video.style.width = '100%';
                body.appendChild(video);
                if (typeof mpegts === 'undefined') {
                    body.innerHTML = '<div class="unsupported"><span class="icon">&#9888;</span><p>播放器未加载，请稍后重试</p></div>';
                    return;
                }
                currentPlayer = mpegts.createPlayer({
                    type: 'flv',
                    url: BASE + '/' + encodeURIComponent(filePath)
                });
                currentPlayer.attachMediaElement(video);
                currentPlayer.load();
                return;
            }

            if (previewableText.indexOf(ext) !== -1) {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', BASE + '/' + encodeURIComponent(filePath), true);

                xhr.onload = function() {
                    if (xhr.status === 200) {
                        body.innerHTML = '<pre>' + escapeHtml(xhr.responseText) + '</pre>';
                    } else {
                        body.innerHTML = '<div class="unsupported"><span class="icon">&#9888;</span><p>文件加载失败</p></div>';
                    }
                };
                xhr.onerror = function() {
                    body.innerHTML = '<div class="unsupported"><span class="icon">&#9888;</span><p>网络错误</p></div>';
                };
                xhr.send();
                return;
            }

            body.innerHTML = '<div class="unsupported"><span class="icon">&#128196;</span><p>该文件类型暂不支持预览</p></div>';
        }

        // Initial load
        loadFiles('');

        // Chat
        var lastMsgID = 0;
        var chatName = '游客-' + Math.floor(1000 + Math.random() * 9000);
        var pollTimer = null;
        var polling = false;

        function pollMessages() {
            if (polling) return;
            polling = true;
            fetch(BASE + '/api/chat/messages?after=' + lastMsgID).then(function(r) {
                if (r.ok) return r.json();
                throw new Error();
            }).then(function(msgs) {
                for (var i = 0; i < msgs.length; i++) {
                    addChatMessage(msgs[i]);
                }
            }).catch(function() {}).then(function() {
                polling = false;
            });
        }

        function toggleChat() {
            var panel = document.getElementById('chatPanel');
            var opening = !panel.classList.contains('active');
            panel.classList.toggle('active');
            if (opening) {
                pollMessages();
                pollTimer = setInterval(pollMessages, 1500);
                document.getElementById('chatInput').focus();
            } else {
                clearInterval(pollTimer);
                pollTimer = null;
            }
        }

        function addChatMessage(msg) {
            if (msg.id <= lastMsgID) return;
            lastMsgID = msg.id;

            var container = document.getElementById('chatMessages');
            var div = document.createElement('div');

            if (msg.type === 'system') {
                div.className = 'chat-msg-system';
                div.textContent = msg.content;
            } else {
                div.className = 'chat-msg';
                div.innerHTML = '<span class="chat-msg-user">' + escapeHtml(msg.username) + '</span>' +
                    '<span class="chat-msg-text">' + escapeHtml(msg.content) + '</span>' +
                    '<span class="chat-msg-time">' + msg.time + '</span>';
            }

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendChatMessage() {
            var input = document.getElementById('chatInput');
            var content = input.value.trim();
            if (!content) return;

            fetch(BASE + '/api/chat/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: chatName, content: content})
            }).then(function(r) {
                if (r.ok) {
                    input.value = '';
                    input.focus();
                } else {
                    showToast('消息发送失败', 'error');
                }
            }).catch(function() {
                showToast('消息发送失败，网络错误', 'error');
            });
        }

        document.getElementById('chatInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                sendChatMessage();
            }
        });
    </script>
</body>
</html>
